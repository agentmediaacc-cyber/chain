<article class="profile-empty-card">
    <div class="profile-empty-icon"><i class="fas {{ icon or 'fa-sparkles' }}"></i></div>
    <h3>{{ title }}</h3>
    <p>{{ message }}</p>
    {% if action_href and action_label %}
    <a class="profile-empty-btn" href="{{ action_href }}">{{ action_label }}</a>
    {% endif %}
</article>
