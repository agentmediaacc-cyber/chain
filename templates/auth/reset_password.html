{% extends "base.html" %}

{% block title %}Set New Password | Chain Premium{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/auth_premium.css">
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>New Password</h1>
            <p>Enter your new secure password below.</p>
        </div>

        {% if error %}
        <div class="error-msg">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="success-msg" style="background: rgba(0, 212, 255, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 15px; border-radius: 12px; margin-bottom: 25px; font-size: 14px; font-weight: bold;">
            <i class="fas fa-check-circle"></i> {{ success }}
        </div>
        {% endif %}

        <form class="auth-form" method="POST">
            <div class="field">
                <label>New Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="field">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="primary" style="width: 100%; padding: 15px; border-radius: 12px; font-size: 16px; margin-top: 10px;">
                Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
